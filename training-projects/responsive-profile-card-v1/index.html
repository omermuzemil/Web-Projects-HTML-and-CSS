<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Responsive Profile Card | @CodingWithPython</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div class="card">
            <div class="upper-box"></div>
            <div class="profile">
                <img src="images/profile-card-img.jpg" alt="profile picture">
            </div>
            <div class="text">
                <p>CodingWithPython</p>
                <p>Youtuber & Blogger</p>
            </div>
            <div class="icons">
                <img src="images/facebook.png" alt="facebook icon">
                <img src="images/twitter (1).png" alt="twitter icon">
                <img src="images/instagram (1).png" alt="instagram icon">
                <img src="images/youtube.png" alt="youtube icon">
            </div>
            <div class="buttons">
                <div class="btn">Subscribe</div>
                <div class="btn">Message</div>
            </div>
            <div class="interaction">
                <div class="bottom-icon"><img src="images/heart.png" alt="like icon"> 60k</div>
                <div><img src="images/line.png" alt="line icon"></div>
                <div class="bottom-icon"><img src="images/chat-bubble.png" alt="comment icon"> 20k</div>
                <div><img src="images/line.png" alt="line icon"></div>
                <div class="bottom-icon"><img src="images/back.png" alt="share icon"> 12k</div>
            </div>
        </div>
    </div>
</body>
</html>
