<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Page | @CodingWithPython</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="card">
        <h1>Login Form</h1>
            <div class="inputs email">
                <div class="img-container"><img src="images/user.png" alt="user icon"></div>
                <input type="text" placeholder="Email or Phone" required>
            </div>
            <div class="inputs password">
                <div class="img-container"><img src="images/padlock.png" alt="lock icon"></div>
                <input type="Password" placeholder="Password" required>
            </div>
            <div class="password-recovery">
                <a href="">Forgot password?</a>
            </div>
            <button>Login</button>
            <div class="lower-texts">
                <span>Not a member?</span>
                <a href="">Signup now</a>
            </div>
    </div>
</body>
</html>
