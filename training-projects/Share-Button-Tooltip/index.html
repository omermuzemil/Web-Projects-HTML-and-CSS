<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Share Button Tooltip | @codingWithPyhton</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <input type="checkbox" name="social-media" id="share" hidden>
    <div class="share-content">
        <div class="icons">
            <svg class="icon facebook-icon">
                <a href=""><use xlink:href="sprite.svg#facebook"></use></a>
            </svg>
            <svg class="icon twitter-icon">
                <a href=""><use xlink:href="sprite.svg#twitter"></use></a>
            </svg>
            <svg class="icon instagram-icon">
                <a href=""><use xlink:href="sprite.svg#instagram"></use></a>
            </svg>
            <svg class="icon youtube-icon">
                <a href=""><use xlink:href="sprite.svg#youtube"></use></a>
            </svg>
        </div>
        <div class="triangle"></div>
    </div>
    <label for="share" class="buttons share-button" >SHARE</label>
    <label for="share" class="buttons cancel-button">CANCEL</label>
</body>
</html>
