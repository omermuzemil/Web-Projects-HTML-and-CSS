<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Credit Card | @CodingWithPython</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="card">
        <div class="logo">
            <img src="images/logo.png" alt="logo">
         </div>
         <span class="label">Master Card</span>
         <img src="images/chip.png" alt="chip image" class="chip">
         <div class="card-number">
            <span class="text">Card Number</span>
            <span class="number">8050 5040 2030 3020</span>
         </div>
         <div class="due-date-text">Valid Thru</div>
         <div class="lower-part">
            <span class="name">Omer Muzemil Abdela</span>
            <span class="due-date">05/28</span>
         </div>
    </div>

</body>
</html>
