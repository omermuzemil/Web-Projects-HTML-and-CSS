<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Popup Modal Box | @CodingWithPython</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <input type="checkbox" name="" id="check">
    <div class="background"></div>
    <label class="click" for="check">Click Me</label>
    <div class="alert-box">
        <img src="images/exclamation-solid-full.svg" alt="warning icon">
        <span>Confirm</span>
        <p>Are you sure want to permanently delete this photo?</p>
        <div class="buttons">
            <label for="check">Yes, Delete!</label>
            <label for="check">Cancel</label>
        </div>
    </div>
</body>
</html>
