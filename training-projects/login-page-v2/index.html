<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Page | @CodingWithPython</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="card">
        <h1>Login Form</h1>
        <div class="inputs email">
            <input type="text" required> <span class="input-label">Email Address</span>
        </div>
        <div class="inputs password"> 
            <input type="Password" required> <span class="input-label"> Password</span>
        </div>
        <div class="password-recovery">
            <input type="checkbox" class="checkbox">
            <label for="password" class="checkbox-label">Remember me</label>
            <a href="">Forgot password?</a>
        </div>
        <button>Login</button>
        <div class="lower-texts">
            <span>Not a member?</span>
            <a href="">Signup now</a>
        </div>
    </div>
</body>
</html>
