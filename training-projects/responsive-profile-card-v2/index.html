<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Responsive Profile Card | @CodingWithPython</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.google.com/specimen/Kumbh+Sans" rel="stylesheet">
</head>
<body>
    <div class="container">
        <div class="top"><img src="images/bg-pattern-top.svg" alt="top image"></div>
        <div class="bottom"><img src="images/bg-pattern-bottom.svg" alt="bottom image"></div>
        <div class="card">
            <div class="profile"><img src="images/image-victor.jpg" alt="profile images"></div>
            <div class="identity">
                <div class="name">Victor Crest</div>
                <div class="age">26</div>
            </div>
            <p>London</p>
            <div class="line">___________________________</div>
            <div class="profile-stats">
                <div class="stat">
                    <div class="number">80K </div>
                    <p class="text">Followers</p>
                </div>              
                <div class="stat">
                    <div class="number">803K</div>
                    <p class="text">Likes</p>
                </div>
                <div class="stat">
                    <div class="number">1.4k </div>
                    <p class="text">Photos</p>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
