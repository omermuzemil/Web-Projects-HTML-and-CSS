<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Responsive Profile Card | @CodingWithPython</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div class="card">
            <div class="upper-icon">
                <img src="images/menu.png" alt="menu icon">
                <img class="second-icon" src="images/setting.png" alt="setting icon">
            </div>
            <div class="profile">
                <img src="images/profile-pic.png" alt="profile image">
            </div>
            <div class="text">
                <p>Jack Nicholas</p>
                <p class="second-text">Web Developer at Google, California</p>
            </div>
            <div class="social-media">
                <img src="images/instagram.png" alt="instagram account">
                <img src="images/telegram.png" alt="telegram account">
                <img src="images/dribble.png" alt="dribble account">
            </div>
            <div class="follow-button">Follow</div>
            <div class="lower-box">
                <p>Learn More About My profile</p>
                <img src="images/arrow.png" alt="arrow icon">
            </div>
        </div>
    </div>
    
</body>
</html>
