<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Flipping Animation Card | @CodingWithPython</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div class="flip-card">
            <div class="cards front-card">
                <div class="circle"></div>
                <div class="triangle"></div>
                <div class="square"></div>
            </div>
            <div class="cards back-card">
                <svg class="icon">
                    <use xlink:href="sprite.svg#up-arrow"></use>
                </svg>
                <span>8650 4006</span>
            </div>
        </div>
    </div>

</body>
</html>
